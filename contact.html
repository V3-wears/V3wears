<!DOCTYPE html>
<html>
<head>
  <title>Contact - V3 Wear</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Contact Us</h1>

<form>
  <input type="text" placeholder="Your Name"><br>
  <input type="email" placeholder="Your Email"><br>
  <textarea placeholder="Your Message"></textarea><br>
  <button type="submit">Send</button>
</form>

</body>
</html>
