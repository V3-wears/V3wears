<!DOCTYPE html>
<html>
<head>
  <title>V3 Wear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    .logo { font-size: 22px; font-weight: bold; }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1520975922323-9c09d7c8f9f7') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 45px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      border: 1px solid #222;
      padding: 10px;
    }

    .card img {
      width: 100%;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid white;
      background: none;
      color: white;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">V3 WEAR</div>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>I CAME. I SAW. I CONQUERED.</h1>
</section>

<section class="section" id="shop">
  <h2>Shop</h2>

  <div class="products">

    <div class="card">
      <img src="V3Tracksuit.PNG">
      <p>V3-Tracksuit</p>
      <button class="btn" onclick="order('V3-Tracksuit')">Order</button>
    </div>

    <div class="card">
      <img src="V3TracksuitRed.PNG">
      <p>V3TracksuitRed</p>
      <button class="btn" onclick="order('V3TracksuitRed')">Order</button>
    </div>

    <div class="card">
      <img src="V3tracksuitblack.PNG">
      <p>V3-tracksuitblack</p>
      <button class="btn" onclick="order('V3-tracksuitblack')">Order</button>
    </div>

  </div>
</section>

<section class="section" id="contact">
  <h2>Contact</h2>
  <p>
    <a href="https://wa.me/+44 7308 970610" target="_blank">WhatsApp</a> |
    <a href="https://instagram.com/YOURUSERNAME" target="_blank">Instagram</a>
  </p>
</section>

<footer>
  © 2026 V3 Wear
</footer>

<script>
function order(item){
  let phone = "+44 7308 970610";
  let message = "Hello, I want to order " + item + " from V3 Wear";
  window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message));
}
</script>

</body>
</html>
